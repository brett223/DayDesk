<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DayDesk — Task & Billing Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0e;--sur:#1a1a18;--sur2:#222220;--brd:#2e2e2b;
  --acc:#c9a84c;--grn:#7ecfa0;--red:#e07070;--txt:#e8e6df;--mut:#7a7870;
  --r:6px;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
input,textarea,select,button{font-family:'DM Sans',sans-serif;font-size:14px}
input[type=number]::-webkit-inner-spin-button{opacity:1}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}

/* HEADER */
#header{
  display:flex;align-items:center;gap:12px;padding:12px 22px;
  background:var(--sur);border-bottom:1px solid var(--brd);
  position:sticky;top:0;z-index:50;flex-shrink:0;flex-wrap:wrap;
}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--acc);white-space:nowrap;flex-shrink:0}
#hdate{color:var(--mut);font-family:'DM Mono',monospace;font-size:11px;flex:1;text-align:center}
.hbtns{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden;min-height:0}
#main{flex:1;overflow-y:auto;padding:20px 22px}
#sidebar{width:310px;min-width:310px;border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);
  border:1px solid var(--brd);background:var(--sur2);color:var(--txt);
  font-size:12px;cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn-acc{background:var(--acc);color:#0f0f0e;border-color:var(--acc);font-weight:500}
.btn-acc:hover{background:#dbb95a;color:#0f0f0e;border-color:#dbb95a}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:var(--red);color:#fff}

/* INPUTS */
.inp{background:var(--sur2);border:1px solid var(--brd);color:var(--txt);border-radius:4px;padding:5px 9px;outline:none}
.inp:focus{border-color:var(--acc)}
.inp-ghost{background:transparent;border:none;outline:none;color:var(--txt);width:100%}

/* SECTION LABEL */
.slabel{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}

/* PRIORITY GROUP */
.pri-group{margin-bottom:26px}
.pri-header{display:flex;align-items:center;gap:10px;padding-bottom:8px;border-bottom:1px solid var(--brd);margin-bottom:10px}
.pri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pri-title{font-family:'Playfair Display',serif;font-size:16px;flex:1}
.pri-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut)}

/* CUSTOM HEADING */
.cust-heading{display:flex;align-items:center;gap:10px;padding-bottom:8px;border-bottom:1px solid var(--brd);margin:24px 0 10px}
.cust-heading input{font-family:'Playfair Display',serif;font-size:16px;flex:1}

/* TASK CARD */
.task-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:6px}
.task-row{display:flex;align-items:center;gap:8px;padding:9px 11px}
.task-row:hover .task-actions{opacity:1}
.task-expand{background:none;border:none;color:var(--mut);cursor:pointer;font-size:11px;width:14px;text-align:center;flex-shrink:0;padding:0}
.task-expand:hover{color:var(--txt)}

/* STATUS CIRCLE */
.status-btn{width:20px;height:20px;border-radius:50%;border:2px solid var(--brd);background:transparent;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.status-btn.partial{border-color:var(--acc)}
.status-btn.complete{border-color:var(--grn);background:var(--grn)}
.status-btn:hover{border-color:var(--grn)}

/* TASK TITLE */
.task-title{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:13px;min-width:0}
.task-title.done{text-decoration:line-through;color:var(--mut)}

/* REF BADGE */
.ref-inp{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--acc);
  background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);
  border-radius:4px;padding:3px 7px;width:76px;text-align:center;outline:none
}
.ref-inp::placeholder{color:var(--mut)}

.task-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);white-space:nowrap}
.task-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}

/* TASK DETAIL */
.task-detail{padding:10px 12px 12px;border-top:1px solid var(--brd);display:none;flex-direction:column;gap:9px}
.task-detail.open{display:flex}
.detail-row{display:flex;align-items:center;gap:8px}
.dlabel{font-size:11px;color:var(--mut);width:62px;flex-shrink:0;font-family:'DM Mono',monospace}

/* SUBTASKS */
.sub-item{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:4px}
.sub-item:hover{background:var(--sur2)}
.sub-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--brd);background:transparent;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;color:#0f0f0e;transition:all .15s}
.sub-cb.done{background:var(--grn);border-color:var(--grn)}
.sub-title{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:12px}
.sub-title.done{text-decoration:line-through;color:var(--mut)}

/* ADD TASK BAR */
.add-bar{display:flex;gap:6px;margin-top:5px}
.add-inp{flex:1;background:transparent;border:1px dashed var(--brd);color:var(--txt);
  border-radius:var(--r);padding:7px 10px;font-size:13px;outline:none;transition:border .15s}
.add-inp:focus{border-color:var(--acc);border-style:solid}

/* DEADLINES */
.dl-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--sur);
  border:1px solid var(--brd);border-radius:var(--r);margin-bottom:6px}
.dl-title{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:13px}
.dl-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);background:transparent;border:none;outline:none;cursor:pointer}
.dl-badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:20px}

/* ARCHIVE */
.arc-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--sur);
  border:1px solid var(--brd);border-radius:var(--r);margin-bottom:4px;opacity:.8}
.arc-item:hover{opacity:1}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;
  justify-content:center;z-index:200;padding:16px}
.modal{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:24px;
  width:380px;max-width:100%}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:16px}
.mfield{margin-bottom:13px}
.mlabel{font-size:11px;color:var(--mut);margin-bottom:5px;display:block;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.minp{width:100%;background:var(--sur2);border:1px solid var(--brd);color:var(--txt);
  border-radius:var(--r);padding:8px 11px;font-family:'DM Mono',monospace;outline:none}
.minp:focus{border-color:var(--acc)}
.bill-result{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);
  border-radius:var(--r);padding:14px;text-align:center;margin-top:12px}
.bill-amt{font-family:'Playfair Display',serif;font-size:28px;color:var(--acc)}
.bill-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);margin-top:4px}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* REPORT TABLE */
.rep-table{width:100%;border-collapse:collapse;font-size:12px}
.rep-table th{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;
  color:var(--mut);padding:6px 8px;border-bottom:1px solid var(--brd);text-align:left}
.rep-table td{padding:7px 8px;border-bottom:1px solid var(--brd)}
.rep-total{text-align:right;margin-top:12px;font-family:'Playfair Display',serif;font-size:20px;color:var(--acc)}

/* AI SIDEBAR */
#ai-header{padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
#ai-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
#ai-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:90%;font-size:12.5px;line-height:1.55;padding:8px 12px;border:1px solid}
.ai-user{align-self:flex-end;background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.25);border-radius:10px 10px 2px 10px}
.ai-assistant{align-self:flex-start;background:var(--sur2);border-color:var(--brd);border-radius:10px 10px 10px 2px}
#ai-input-row{padding:12px 16px;border-top:1px solid var(--brd);display:flex;gap:8px;flex-shrink:0}
#ai-input{flex:1;background:var(--sur2);border:1px solid var(--brd);color:var(--txt);
  border-radius:var(--r);padding:8px 10px;font-size:12px;resize:none;outline:none}
#ai-input:focus{border-color:var(--acc)}
#ai-send{width:36px;height:36px;background:var(--acc);border:none;border-radius:var(--r);
  cursor:pointer;color:#0f0f0e;font-size:14px;flex-shrink:0;align-self:flex-end}
#ai-send:hover{background:#dbb95a}
.thinking{display:flex;gap:4px;align-items:center}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--mut);animation:think 1.4s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes think{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.1);opacity:1}}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <span class="logo">DayDesk</span>
  <span id="hdate"></span>
  <div class="hbtns">
    <span style="font-size:12px;color:var(--mut)">R</span>
    <input type="number" id="rateInput" class="inp" style="width:72px;font-family:'DM Mono',monospace" value="850" title="Your hourly rate"/>
    <span style="font-size:11px;color:var(--mut)">/hr</span>
    <button class="btn" onclick="addHeading()">＋ Heading</button>
    <button class="btn" onclick="openReport()">⬇ Report</button>
  </div>
</div>

<!-- LAYOUT -->
<div id="layout">
  <div id="main"></div>
  <div id="sidebar">
    <div id="ai-header">
      <div id="ai-dot"></div>
      <span style="font-family:'DM Mono',monospace;font-size:12px">AI Assistant</span>
      <span style="font-size:10px;color:var(--mut);margin-left:auto">Claude</span>
    </div>
    <div id="ai-messages"></div>
    <div id="ai-input-row">
      <textarea id="ai-input" rows="2" placeholder="Ask about your tasks…"></textarea>
      <button id="ai-send">➤</button>
    </div>
  </div>
</div>

<!-- BILLING MODAL -->
<div id="billModal" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-title">Log Time & Bill</div>
    <div id="billTaskName" style="color:var(--mut);font-size:12px;margin-bottom:16px"></div>
    <div class="mfield">
      <label class="mlabel">Hours spent</label>
      <input type="number" id="billHours" class="minp" placeholder="e.g. 1.5" step="0.25" oninput="calcBill()"/>
    </div>
    <div class="mfield">
      <label class="mlabel">Billing Reference</label>
      <input type="text" id="billRef" class="minp" placeholder="e.g. INV-2024-001"/>
    </div>
    <div id="billResult" style="display:none" class="bill-result">
      <div id="billAmt" class="bill-amt"></div>
      <div id="billDetail" class="bill-detail"></div>
    </div>
    <div class="mactions">
      <button class="btn" onclick="closeBill()">Cancel</button>
      <button class="btn btn-acc" onclick="saveBill()">Save & Archive</button>
    </div>
  </div>
</div>

<!-- REPORT MODAL -->
<div id="repModal" class="overlay" style="display:none">
  <div class="modal" style="width:580px;max-height:82vh;overflow-y:auto">
    <div class="modal-title">Billing Report</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
      <input type="date" id="repFrom" class="inp" onchange="renderReport()"/>
      <span style="color:var(--mut)">to</span>
      <input type="date" id="repTo" class="inp" onchange="renderReport()"/>
    </div>
    <div id="repContent"></div>
    <div class="mactions">
      <button class="btn" onclick="document.getElementById('repModal').style.display='none'">Close</button>
      <button class="btn btn-acc" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// STATE & PERSISTENCE
// ════════════════════════════════════════════════════
const SKEY = 'daydesk_v5';
let state = { tasks:[], deadlines:[], archive:[], headings:[], rate:'850' };

function loadState(){
  try{ const s=JSON.parse(localStorage.getItem(SKEY)); if(s) state=s; }catch(e){}
}
function save(){
  state.rate = document.getElementById('rateInput').value;
  localStorage.setItem(SKEY, JSON.stringify(state));
}

// ════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════
const uid = () => Math.random().toString(36).slice(2,10);
const today = () => new Date().toISOString().slice(0,10);
const money = n => 'R\u00a0'+Number(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2});
const daysUntil = d => Math.round((new Date(d+'T00:00:00')-new Date(today()+'T00:00:00'))/86400000);
const getRate = () => parseFloat(document.getElementById('rateInput').value)||0;
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const PRI_COL   = {high:'#e07070', medium:'#c9a84c', low:'#7ecfa0'};
const PRI_LABEL = {high:'High Priority', medium:'Medium Priority', low:'Low Priority'};

function mkTask(title='',priority='medium',headingId=null){
  return {id:uid(),title,priority,status:'todo',ref:'',desc:'',tags:'',timeSpent:0,billingRef:'',billedValue:0,subtasks:[],headingId,completedAt:null,createdAt:today()};
}

// ════════════════════════════════════════════════════
// RENDER ENGINE
// ════════════════════════════════════════════════════
function renderAll(){
  renderMain();
  renderArchive();
}

function renderMain(){
  const main = document.getElementById('main');
  let html = '';

  // Priority groups
  ['high','medium','low'].forEach(p=>{
    const tasks = state.tasks.filter(t=>t.priority===p && !t.headingId);
    html += renderPriGroup(p, tasks);
  });

  // Custom headings
  state.headings.forEach(h=>{
    const tasks = state.tasks.filter(t=>t.headingId===h.id);
    html += renderHeadingGroup(h, tasks);
  });

  // Deadlines
  html += renderDeadlines();

  // Archive toggle
  html += `
    <div style="margin-top:28px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="slabel" style="cursor:pointer" onclick="toggleArchive()">
          <span id="arcArrow">▶</span> Completed Archive
          ${state.archive.length ? '<span style="color:var(--mut);margin-left:4px">('+state.archive.length+')</span>' : ''}
        </span>
      </div>
      <div id="arcList" style="display:none"></div>
    </div>`;

  main.innerHTML = html;
  bindTaskEvents();
  renderArchive();
}

function renderPriGroup(p, tasks){
  const done = tasks.filter(t=>t.status==='complete').length;
  return `
  <div class="pri-group">
    <div class="pri-header">
      <div class="pri-dot" style="background:${PRI_COL[p]}"></div>
      <span class="pri-title">${PRI_LABEL[p]}</span>
      <span class="pri-count">${done}/${tasks.length}</span>
    </div>
    ${tasks.map(t=>renderTask(t)).join('')}
    <div class="add-bar">
      <input class="add-inp" data-pri="${p}" data-hid="" placeholder="+ Add ${p} priority task… (press Enter)"/>
    </div>
  </div>`;
}

function renderHeadingGroup(h, tasks){
  return `
  <div style="margin-bottom:24px">
    <div class="cust-heading">
      <input class="inp-ghost" style="font-family:'Playfair Display',serif;font-size:16px"
        data-hname="${esc(h.id)}" value="${esc(h.title)}" placeholder="Heading name…"/>
      <button class="btn btn-sm btn-red" onclick="deleteHeading('${h.id}')">✕</button>
    </div>
    ${tasks.map(t=>renderTask(t)).join('')}
    <div class="add-bar">
      <input class="add-inp" data-pri="medium" data-hid="${h.id}" placeholder="+ Add task here… (press Enter)"/>
    </div>
  </div>`;
}

function renderTask(t){
  const statusInner = t.status==='partial'
    ? `<div style="width:8px;height:8px;border-radius:50%;background:var(--acc)"></div>`
    : t.status==='complete' ? `<span style="font-size:10px;color:#0f0f0e;font-weight:bold">✓</span>` : '';

  const timeBadge = t.timeSpent>0 ? `<span class="task-time">${t.timeSpent}h</span>` : '';
  const subCount  = t.subtasks.length ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)">${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length}</span>` : '';

  const subHTML = t.subtasks.map(s=>`
    <div class="sub-item">
      <div class="sub-cb ${s.done?'done':''}" data-tid="${t.id}" data-sid="${s.id}">${s.done?'✓':''}</div>
      <input class="sub-title ${s.done?'done':''}" value="${esc(s.title)}" data-tid="${t.id}" data-sid="${s.id}" data-field="subtask"/>
      <button class="btn btn-sm btn-red" onclick="deleteSubtask('${t.id}','${s.id}')">✕</button>
    </div>`).join('');

  return `
  <div class="task-card" id="tc_${t.id}">
    <div class="task-row">
      <button class="task-expand" data-tid="${t.id}">▸</button>
      <div class="status-btn ${t.status}" data-tid="${t.id}" style="border:2px solid ${t.status==='partial'?'var(--acc)':t.status==='complete'?'var(--grn)':'var(--brd)'}${t.status==='complete'?';background:var(--grn)':''}">
        ${statusInner}
      </div>
      <input class="task-title ${t.status==='complete'?'done':''}" value="${esc(t.title)}" data-tid="${t.id}" data-field="title" placeholder="Task title…"/>
      <input class="ref-inp" value="${esc(t.ref)}" data-tid="${t.id}" data-field="ref" placeholder="Ref#"/>
      ${timeBadge}${subCount}
      <div class="task-actions">
        <button class="btn btn-sm" data-bill="${t.id}" title="Log time">⏱</button>
        <button class="btn btn-sm btn-red" data-del="${t.id}">✕</button>
      </div>
    </div>
    <div class="task-detail" id="td_${t.id}">
      <div class="detail-row">
        <span class="dlabel">Notes</span>
        <input class="inp" style="flex:1" value="${esc(t.desc)}" data-tid="${t.id}" data-field="desc" placeholder="Description…"/>
      </div>
      <div class="detail-row">
        <span class="dlabel">Category</span>
        <input class="inp" style="flex:1" value="${esc(t.tags)}" data-tid="${t.id}" data-field="tags" placeholder="e.g. client work, admin…"/>
      </div>
      <div class="detail-row">
        <span class="dlabel">Priority</span>
        <select class="inp" data-tid="${t.id}" data-field="priority">
          ${['high','medium','low'].map(p=>`<option value="${p}" ${t.priority===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
        </select>
      </div>
      <div style="margin-top:4px">
        ${subHTML}
        <button class="btn btn-sm" style="margin-top:4px" onclick="addSubtask('${t.id}')">＋ Subtask</button>
      </div>
    </div>
  </div>`;
}

function renderDeadlines(){
  const items = state.deadlines.map(dl=>{
    const days = dl.date ? daysUntil(dl.date) : null;
    let col='var(--mut)', badge='';
    if(days!==null){
      col = days<0||days<=3 ? 'var(--red)' : days<=7 ? 'var(--acc)' : 'var(--grn)';
      badge = days<0?'Overdue':`${days}d`;
    }
    return `
    <div class="dl-item">
      <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div>
      <input class="dl-title" value="${esc(dl.title)}" data-dlid="${dl.id}" data-dlfield="title"/>
      <input type="date" class="dl-date inp" value="${dl.date||''}" data-dlid="${dl.id}" data-dlfield="date"/>
      ${badge?`<span class="dl-badge" style="background:${col}22;color:${col}">${badge}</span>`:''}
      <button class="btn btn-sm btn-red" onclick="deleteDeadline('${dl.id}')">✕</button>
    </div>`;
  }).join('');

  return `
  <div style="margin-top:26px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="slabel">Upcoming Deadlines</span>
      <button class="btn btn-sm" onclick="addDeadline()">＋ Add</button>
    </div>
    ${items || '<div style="color:var(--mut);font-size:12px;font-style:italic">No deadlines yet.</div>'}
  </div>`;
}

function renderArchive(){
  const arc = document.getElementById('arcList');
  if(!arc) return;
  if(!state.archive.length){
    arc.innerHTML='<div style="color:var(--mut);font-size:12px;font-style:italic">No completed tasks yet.</div>';
    return;
  }
  const sorted = [...state.archive].sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  arc.innerHTML = sorted.map(t=>`
    <div class="arc-item">
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);white-space:nowrap">${t.completedAt||'—'}</span>
      <span style="flex:1;font-size:12px;text-decoration:line-through;color:var(--mut)">${esc(t.title)}</span>
      ${t.billingRef?`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--acc)">${esc(t.billingRef)}</span>`:''}
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);white-space:nowrap">${t.timeSpent||0}h · ${money(t.billedValue||0)}</span>
    </div>`).join('');
}

// ════════════════════════════════════════════════════
// EVENT BINDING (delegated, so it always works)
// ════════════════════════════════════════════════════
function bindTaskEvents(){
  const main = document.getElementById('main');

  // STATUS CYCLE
  main.querySelectorAll('.status-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const tid = btn.dataset.tid;
      const t = state.tasks.find(x=>x.id===tid); if(!t) return;
      const cycle = {todo:'partial',partial:'complete',complete:'todo'};
      t.status = cycle[t.status];
      if(t.status==='complete') openBill(tid);
      else { save(); renderAll(); }
    });
  });

  // EXPAND TOGGLE
  main.querySelectorAll('.task-expand').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const detail = document.getElementById('td_'+btn.dataset.tid);
      if(!detail) return;
      const isOpen = detail.classList.contains('open');
      detail.classList.toggle('open');
      btn.textContent = isOpen ? '▸' : '▾';
    });
  });

  // TASK FIELD INPUTS
  main.querySelectorAll('[data-tid][data-field]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const t = state.tasks.find(x=>x.id===el.dataset.tid); if(!t) return;
      t[el.dataset.field] = el.value;
      save();
    });
    el.addEventListener('change', ()=>{
      if(el.dataset.field==='priority'){ save(); renderAll(); }
    });
  });

  // SUBTASK TOGGLE
  main.querySelectorAll('.sub-cb').forEach(cb=>{
    cb.addEventListener('click', ()=>{
      const t = state.tasks.find(x=>x.id===cb.dataset.tid); if(!t) return;
      const s = t.subtasks.find(x=>x.id===cb.dataset.sid); if(!s) return;
      s.done = !s.done;
      save(); renderAll();
    });
  });

  // SUBTASK TITLE
  main.querySelectorAll('[data-field="subtask"]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const t = state.tasks.find(x=>x.id===el.dataset.tid); if(!t) return;
      const s = t.subtasks.find(x=>x.id===el.dataset.sid); if(!s) return;
      s.title = el.value; save();
    });
  });

  // DELETE
  main.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.tasks = state.tasks.filter(x=>x.id!==btn.dataset.del);
      save(); renderAll();
    });
  });

  // BILL BUTTON
  main.querySelectorAll('[data-bill]').forEach(btn=>{
    btn.addEventListener('click', ()=>openBill(btn.dataset.bill));
  });

  // ADD TASK (Enter key)
  main.querySelectorAll('.add-inp').forEach(inp=>{
    inp.addEventListener('keydown', e=>{
      if(e.key!=='Enter') return;
      const title = inp.value.trim(); if(!title) return;
      state.tasks.push(mkTask(title, inp.dataset.pri, inp.dataset.hid||null));
      save(); renderAll();
    });
  });

  // DEADLINE INPUTS
  main.querySelectorAll('[data-dlid]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const dl = state.deadlines.find(x=>x.id===el.dataset.dlid); if(!dl) return;
      dl[el.dataset.dlfield] = el.value; save();
      if(el.dataset.dlfield==='date') renderAll();
    });
  });

  // HEADING RENAME
  main.querySelectorAll('[data-hname]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const h = state.headings.find(x=>x.id===el.dataset.hname); if(!h) return;
      h.title = el.value; save();
    });
  });
}

// ════════════════════════════════════════════════════
// TASK ACTIONS
// ════════════════════════════════════════════════════
function addSubtask(tid){
  const t = state.tasks.find(x=>x.id===tid); if(!t) return;
  t.subtasks.push({id:uid(),title:'Subtask',done:false});
  save(); renderAll();
  // Re-open detail
  setTimeout(()=>{
    const d=document.getElementById('td_'+tid);
    if(d){d.classList.add('open');const b=d.parentElement.querySelector('.task-expand');if(b)b.textContent='▾';}
  },30);
}

function deleteSubtask(tid,sid){
  const t=state.tasks.find(x=>x.id===tid); if(!t)return;
  t.subtasks=t.subtasks.filter(x=>x.id!==sid);
  save(); renderAll();
}

function deleteHeading(hid){
  state.headings=state.headings.filter(x=>x.id!==hid);
  state.tasks=state.tasks.map(t=>t.headingId===hid?{...t,headingId:null}:t);
  save(); renderAll();
}

function addDeadline(){
  state.deadlines.push({id:uid(),title:'New Deadline',date:''});
  save(); renderAll();
}

function deleteDeadline(id){
  state.deadlines=state.deadlines.filter(x=>x.id!==id);
  save(); renderAll();
}

function addHeading(){
  state.headings.push({id:uid(),title:'New Heading'});
  save(); renderAll();
}

function toggleArchive(){
  const list=document.getElementById('arcList');
  const arrow=document.getElementById('arcArrow');

// ════════════════════════════════════════════════════
// BILLING
// ════════════════════════════════════════════════════
let activeBillId = null;

function openBill(tid){
  const t=state.tasks.find(x=>x.id===tid); if(!t)return;
  activeBillId=tid;
  document.getElementById('billTaskName').textContent=t.title;
  document.getElementById('billHours').value=t.timeSpent||'';
  document.getElementById('billRef').value=t.billingRef||t.ref||'';
  document.getElementById('billResult').style.display='none';
  document.getElementById('billModal').style.display='flex';
  calcBill();
}

function calcBill(){
  const h=parseFloat(document.getElementById('billHours').value)||0;
  const v=h*getRate();
  const res=document.getElementById('billResult');
  if(h>0){
    document.getElementById('billAmt').textContent=money(v);
    document.getElementById('billDetail').textContent=`${h}h × R${getRate().toFixed(2)}/hr`;
    res.style.display='block';
  } else { res.style.display='none'; }
}

function closeBill(){
  document.getElementById('billModal').style.display='none';
  // Reset task status if cancelled from complete
  const t=state.tasks.find(x=>x.id===activeBillId);
  if(t&&t.status==='complete'){t.status='partial';save();renderAll();}
  activeBillId=null;
}

function saveBill(){
  const t=state.tasks.find(x=>x.id===activeBillId); if(!t)return;
  const h=parseFloat(document.getElementById('billHours').value)||0;
  const ref=document.getElementById('billRef').value.trim();
  const v=h*getRate();
  const archived={...t,timeSpent:h,billingRef:ref,billedValue:v,completedAt:today(),status:'complete'};
  state.archive.push(archived);
  state.tasks=state.tasks.filter(x=>x.id!==activeBillId);
  save();
  document.getElementById('billModal').style.display='none';
  activeBillId=null;
  renderAll();
}

// ════════════════════════════════════════════════════
// REPORT
// ════════════════════════════════════════════════════
function openReport(){
  document.getElementById('repFrom').value=today().slice(0,7)+'-01';
  document.getElementById('repTo').value=today();
  document.getElementById('repModal').style.display='flex';
  renderReport();
}

function renderReport(){
  const from=document.getElementById('repFrom').value;
  const to=document.getElementById('repTo').value;
  const items=state.archive.filter(t=>{const d=t.completedAt||'';return(!from||d>=from)&&(!to||d<=to);});
  const total=items.reduce((s,t)=>s+(t.billedValue||0),0);
  const totalH=items.reduce((s,t)=>s+(t.timeSpent||0),0);

  if(!items.length){
    document.getElementById('repContent').innerHTML='<div style="color:var(--mut);font-size:12px;font-style:italic">No completed tasks in this range.</div>';
    return;
  }
  document.getElementById('repContent').innerHTML=`
    <table class="rep-table">
      <thead><tr>
        <th>Date</th><th>Task</th><th>Ref</th><th>Hours</th><th>Value</th>
      </tr></thead>
      <tbody>
        ${items.map(t=>`<tr>
          <td style="font-family:'DM Mono',monospace;font-size:11px">${t.completedAt||'—'}</td>
          <td>${esc(t.title)}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--acc)">${esc(t.billingRef||'—')}</td>
          <td style="font-family:'DM Mono',monospace">${t.timeSpent||0}h</td>
          <td style="font-family:'DM Mono',monospace;color:var(--grn)">${money(t.billedValue||0)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="rep-total">${money(total)} <span style="font-size:12px;color:var(--mut);font-family:'DM Mono',monospace">(${totalH}h total)</span></div>`;
}

function exportCSV(){
  const from=document.getElementById('repFrom').value;
  const to=document.getElementById('repTo').value;
  const items=state.archive.filter(t=>{const d=t.completedAt||'';return(!from||d>=from)&&(!to||d<=to);});
  const rows=[['Date','Task','Reference','Hours','Rate','Value (ZAR)']];
  items.forEach(t=>rows.push([t.completedAt||'',t.title,t.billingRef||'',t.timeSpent||0,getRate(),t.billedValue||0]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`daydesk_${from}_${to}.csv`; a.click();
}

// ════════════════════════════════════════════════════
// AI CHAT
// ════════════════════════════════════════════════════
function appendAI(text, role){
  const msgs=document.getElementById('ai-messages');
  const div=document.createElement('div');
  div.className=`ai-msg ai-${role}`;
  div.innerHTML=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

async function sendAI(){
  const inp=document.getElementById('ai-input');
  const msg=inp.value.trim(); if(!msg) return;
  inp.value='';
  appendAI(msg,'user');

  const taskSummary=state.tasks.map(t=>`[${t.priority.toUpperCase()}] "${t.title}" — ${t.status}${t.ref?' ref:'+t.ref:''}`).join('\n')||'None';
  const dlSummary=state.deadlines.map(d=>`${d.title}: ${d.date||'no date'}`).join('\n')||'None';

  const thinking=appendAI('<div class="thinking"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>','assistant');

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        system:`You are DayDesk, a productivity assistant. User bills at R${getRate()}/hr (ZAR). Today: ${today()}.\n\nActive tasks:\n${taskSummary}\n\nDeadlines:\n${dlSummary}\n\nBe concise and practical.`,
        messages:[{role:'user',content:msg}]
      })
    });
    const data=await res.json();
    thinking.remove();
    appendAI(data.content?.map(b=>b.text||'').join('')||'Could not respond.','assistant');
  } catch(e) {
    thinking.remove();
    appendAI('Connection error. Please try again.','assistant');
  }
}
